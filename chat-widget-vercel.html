<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Dexan - Assistente Claude</title>
    <style>
        :root {
            --dexan-blue: #1E40AF;
            --dexan-orange: #F97316;
            --bg-dark: #1a1f36;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-button {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--dexan-blue), var(--dexan-orange));
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 9998;
        }

        .chat-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(249, 115, 22, 0.6);
        }

        .chat-button svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 400px;
            max-width: calc(100vw - 48px);
            height: 600px;
            max-height: calc(100vh - 140px);
            background: rgba(26, 31, 54, 0.98);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            flex-direction: column;
            z-index: 9999;
        }

        .chat-container.active {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            background: linear-gradient(135deg, var(--dexan-blue), var(--dexan-orange));
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-title h3 {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 2px;
        }

        .chat-title p {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
        }

        .chat-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-close svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--dexan-orange), #ff8c42);
            color: white;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--dexan-blue), #3b82f6);
            color: white;
        }

        .message-content {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(255, 140, 66, 0.2));
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0 0 20px 20px;
        }

        .chat-input input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .chat-input input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--dexan-orange);
        }

        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .chat-send {
            background: linear-gradient(135deg, var(--dexan-blue), var(--dexan-orange));
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-send:hover {
            transform: scale(1.05);
        }

        .chat-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-send svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .welcome-message h4 {
            color: white;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .welcome-message p {
            font-size: 13px;
            line-height: 1.6;
        }

        .suggested-questions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        .suggested-question {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            cursor: pointer;
            text-align: left;
        }

        .suggested-question:hover {
            background: rgba(249, 115, 22, 0.2);
            border-color: var(--dexan-orange);
            color: white;
        }

        .info-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            text-align: center;
            color: white;
        }

        .info-box h2 {
            margin-bottom: 16px;
            color: var(--dexan-orange);
        }

        .info-box p {
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 12px;
        }

        .info-box code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--dexan-orange);
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h2>✅ Backend Configurado!</h2>
        <p>Este chat agora usa o backend Vercel para chamadas seguras à API.</p>
        <p><strong>Clique no botão de chat para testar!</strong> 👉</p>
    </div>

    <button class="chat-button" id="chatButton">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        </svg>
    </button>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar">🤖</div>
                <div class="chat-title">
                    <h3>Assistente Dexan</h3>
                    <p>Powered by Claude</p>
                </div>
            </div>
            <button class="chat-close" id="chatClose">
                <svg viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h4>👋 Olá! Sou o Assistente Dexan</h4>
                <p>Posso ajudar com dúvidas sobre o roadmap, estratégias de marketplace, e informações do projeto.</p>
                <div class="suggested-questions">
                    <button class="suggested-question" data-question="Quais são as prioridades da semana atual?">
                        📅 Quais são as prioridades da semana atual?
                    </button>
                    <button class="suggested-question" data-question="Como devo precificar produtos no Mercado Livre?">
                        💰 Como devo precificar produtos no ML?
                    </button>
                    <button class="suggested-question" data-question="Quais documentos preciso para abrir o CNPJ?">
                        📄 Documentos para abertura de CNPJ?
                    </button>
                </div>
            </div>
        </div>

        <div class="chat-input">
            <input 
                type="text" 
                id="chatInput" 
                placeholder="Digite sua pergunta..."
                autocomplete="off"
            />
            <button class="chat-send" id="chatSend">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // ⚠️ CONFIGURAÇÃO NECESSÁRIA ⚠️
        // Substitua pela URL do seu backend Vercel
        const BACKEND_URL = 'COLE_URL_BACKEND_VERCEL_AQUI';
        // Exemplo: 'https://dexan-chat-backend.vercel.app/api/chat'

        let conversationHistory = [];

        const chatButton = document.getElementById('chatButton');
        const chatContainer = document.getElementById('chatContainer');
        const chatClose = document.getElementById('chatClose');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');

        chatButton.addEventListener('click', () => {
            chatContainer.classList.add('active');
            chatInput.focus();
        });

        chatClose.addEventListener('click', () => {
            chatContainer.classList.remove('active');
        });

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('suggested-question')) {
                const question = e.target.getAttribute('data-question');
                sendMessage(question);
            }
        });

        chatSend.addEventListener('click', () => {
            const message = chatInput.value.trim();
            if (message) {
                sendMessage(message);
                chatInput.value = '';
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const message = chatInput.value.trim();
                if (message) {
                    sendMessage(message);
                    chatInput.value = '';
                }
            }
        });

        async function sendMessage(message) {
            if (BACKEND_URL === 'COLE_URL_BACKEND_VERCEL_AQUI') {
                alert('⚠️ Configure a URL do backend!\n\nProcure por COLE_URL_BACKEND_VERCEL_AQUI no código e substitua pela URL do seu deploy Vercel.');
                return;
            }

            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });

            const typingDiv = showTyping();

            chatInput.disabled = true;
            chatSend.disabled = true;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: conversationHistory
                    })
                });

                typingDiv.remove();

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Erro na requisição');
                }

                const data = await response.json();
                const assistantMessage = data.content[0].text;
                addMessage('assistant', assistantMessage);
                conversationHistory.push({ role: 'assistant', content: assistantMessage });

            } catch (error) {
                typingDiv.remove();
                addMessage('assistant', '❌ Erro: ' + error.message);
                console.error('Error:', error);
            } finally {
                chatInput.disabled = false;
                chatSend.disabled = false;
                chatInput.focus();
            }
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'X' : '🤖';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return typingDiv;
        }

        function formatMessage(text) {
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/`(.*?)`/g, '<code>$1</code>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }
    </script>
</body>
</html>
